    <title>Nikita Sharma</title>
    <script>
      // Redirect 404s to the index.html with the path preserved
      if (window.location.pathname !== "/") {
        window.location.replace(
          "/" + window.location.pathname.slice(1).replace(/&/g, "~and~")
        );
      }
    </script>
  </head>
